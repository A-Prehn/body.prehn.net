<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Træning Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
    font-family: Segoe UI;
    background: #0f172a;
    color: white;
}

.container {
    padding: 30px;
}

.card {
    background: #1e293b;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 8px;
}

input {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    background: #020617;
    border: 1px solid #334155;
    color: white;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    background: #1f7a6b;
    border: none;
    color: white;
    cursor: pointer;
}

.chart-container {
    height: 300px;
}

</style>

</head>
<body>

<div class="container">

<div class="card">

<h2>Kropsmål</h2>

<label>Vægt</label>
<input id="weightInput">

<label>Bryst</label>
<input id="chestInput">

<label>Mave</label>
<input id="waistInput">

<label>Biceps</label>
<input id="bicepsInput">

<button onclick="saveMeasurements()">
Gem
</button>

</div>

<div class="card">

<h2>Graf</h2>

<div class="chart-container">
<canvas id="chart"></canvas>
</div>

</div>

<div class="card">

<h2>Historik</h2>

<div id="history">
Loader...
</div>

</div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbw-tJfqu9tdmpTroa_lFtNSfW8b37fnzwimU60bff2ldzZYjSm5SoXaMsukIeUx-YMW/exec";

let chart;

/* SAVE */

function saveMeasurements()
{
    const formData =
        new FormData();

    formData.append(
        "weight",
        weightInput.value
    );

    formData.append(
        "chest",
        chestInput.value
    );

    formData.append(
        "waist",
        waistInput.value
    );

    formData.append(
        "biceps",
        bicepsInput.value
    );

    fetch(API_URL,
    {
        method: "POST",
        mode: "no-cors",
        body: formData
    });

    setTimeout(loadData, 1000);
}

/* LOAD */

function loadData()
{
    fetch(API_URL)
    .then(r => r.json())
    .then(data =>
    {
        showHistory(data);
        drawChart(data);
    });
}

/* HISTORY */

function showHistory(data)
{
    let html = "";

    for(let i=1;i<data.length;i++)
    {
        let date =
        new Date(data[i][0])
        .toLocaleDateString("da-DK");

        html +=
        date + " | " +
        data[i][1] + " kg<br>";
    }

    history.innerHTML = html;
}

/* CHART */

function drawChart(data)
{
    let labels = [];
    let weight = [];

    for(let i=1;i<data.length;i++)
    {
        labels.push(
            new Date(data[i][0])
            .toLocaleDateString("da-DK")
        );

        weight.push(data[i][1]);
    }

    if(chart)
        chart.destroy();

    chart =
    new Chart(
        document.getElementById("chart"),
        {
            type: "line",

            data:
            {
                labels,

                datasets:
                [{
                    label: "Vægt",
                    data: weight
                }]
            },

            options:
            {
                maintainAspectRatio:false
            }
        });
}

/* INIT */

loadData();

</script>

</body>
</html>
