<!DOCTYPE html>
<html lang="da">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Træning Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
margin-bottom:20px;
border-radius:8px;
}

input{
width:100%;
padding:10px;
margin-top:5px;
background:#020617;
border:1px solid #334155;
color:white;
}

button{
margin-top:10px;
padding:10px 20px;
background:#1f7a6b;
border:none;
color:white;
cursor:pointer;
}

.chart-container{
height:300px;
}

</style>

</head>
<body>

<h2>Træning Dashboard</h2>

<div class="card">

<h3>Ny måling</h3>

<input id="weightInput" placeholder="Vægt">
<input id="chestInput" placeholder="Bryst">
<input id="waistInput" placeholder="Mave">
<input id="bicepsInput" placeholder="Biceps">

<button onclick="save()">Gem</button>

<div id="status"></div>

</div>

<div class="card">

<h3>Historik</h3>

<div id="history">Loader...</div>

</div>

<div class="card">

<h3>Graf</h3>

<div class="chart-container">
<canvas id="chart"></canvas>
</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbw-tJfqu9tdmpTroa_lFtNSfW8b37fnzwimU60bff2ldzZYjSm5SoXaMsukIeUx-YMW/exec";

let chart;

/* SAVE */

async function save()
{
status.innerHTML="Gemmer...";

const url=
API_URL+
"?weight="+encodeURIComponent(weightInput.value)+
"&chest="+encodeURIComponent(chestInput.value)+
"&waist="+encodeURIComponent(waistInput.value)+
"&biceps="+encodeURIComponent(bicepsInput.value)+
"&t="+Date.now();

try{

await fetch(url,{redirect:"follow"});

status.innerHTML="Gemt";

load();

}catch(e){

status.innerHTML="FEJL";
console.log(e);

}
}

/* LOAD */

async function load()
{
try{

const response=
await fetch(API_URL+"?t="+Date.now(),{
redirect:"follow"
});

const data=
await response.json();

console.log("DATA:",data);

showHistory(data);

drawChart(data);

}catch(e){

history.innerHTML="FEJL LOADING";

console.log(e);

}
}

/* HISTORY */

function showHistory(data)
{
let html="";

for(let i=data.length-1;i>=1;i--)
{
html+=
new Date(data[i][0]).toLocaleDateString()+
" | "+data[i][1]+"<br>";
}

history.innerHTML=html;
}

/* CHART */

function drawChart(data)
{
const ctx=document.getElementById("chart").getContext("2d");

const labels=[];
const weight=[];

for(let i=1;i<data.length;i++)
{
labels.push(new Date(data[i][0]).toLocaleDateString());
weight.push(data[i][1]);
}

if(chart)chart.destroy();

chart=new Chart(ctx,{
type:"line",
data:{
labels,
datasets:[{
label:"Vægt",
data:weight
}]
},
options:{
maintainAspectRatio:false
}
});
}

/* INIT */

load();

</script>

</body>
</html>
