<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Træning Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
    font-family: Segoe UI, Arial;
    margin: 0;
    background: #0f172a;
    color: white;
}

.header {
    background: #020617;
    padding: 20px;
    font-size: 22px;
}

.container {
    padding: 30px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 8px;
}

.big {
    font-size: 28px;
}

input {
    width: 100%;
    padding: 6px;
    background: #020617;
    border: 1px solid #334155;
    color: white;
}

button {
    background: #1f7a6b;
    border: none;
    padding: 10px 20px;
    color: white;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 10px;
    margin-right: 10px;
}

button:hover {
    background: #145a4f;
}

.history-table {
    width: 100%;
    border-collapse: collapse;
}

.history-table th,
.history-table td {
    padding: 10px;
    border-bottom: 1px solid #334155;
    text-align: left;
}

/* FIXED GRAPH SIZE */

.chart-container {
    position: relative;
    height: 300px;
    max-height: 300px;
    width: 100%;
}

canvas {
    background: #020617;
    border-radius: 8px;
}

</style>

</head>
<body>

<div class="header">
Træning Dashboard
</div>

<div class="container">

<div class="grid">

<div class="card">
<h3>Vægt</h3>
<div class="big" id="weightDisplay">-</div>
</div>

<div class="card">
<h3>Bryst</h3>
<div class="big" id="chestDisplay">-</div>
</div>

<div class="card">
<h3>Mave</h3>
<div class="big" id="waistDisplay">-</div>
</div>

<div class="card">
<h3>Biceps</h3>
<div class="big" id="bicepsDisplay">-</div>
</div>

</div>

<br>

<div class="card">

<h3>Opdater kropsmål</h3>

<table>

<tr>
<td>Vægt</td>
<td><input id="weightInput" type="number" step="0.1"></td>
</tr>

<tr>
<td>Bryst</td>
<td><input id="chestInput" type="number"></td>
</tr>

<tr>
<td>Mave</td>
<td><input id="waistInput" type="number"></td>
</tr>

<tr>
<td>Biceps</td>
<td><input id="bicepsInput" type="number"></td>
</tr>

</table>

<button onclick="saveMeasurements()">Gem</button>

<button onclick="clearHistory()">Slet historik</button>

</div>

<br>

<div class="card">

<h3>Udvikling</h3>

<div class="chart-container">
<canvas id="chart"></canvas>
</div>

</div>

<br>

<div class="card">

<h3>Historik</h3>

<div id="history"></div>

</div>

</div>

<script>

let chart;

function loadMeasurements()
{
    let weight = localStorage.getItem("weight") || "-";
    let chest = localStorage.getItem("chest") || "-";
    let waist = localStorage.getItem("waist") || "-";
    let biceps = localStorage.getItem("biceps") || "-";

    weightDisplay.innerHTML = weight !== "-" ? weight + " kg" : "-";
    chestDisplay.innerHTML = chest !== "-" ? chest + " cm" : "-";
    waistDisplay.innerHTML = waist !== "-" ? waist + " cm" : "-";
    bicepsDisplay.innerHTML = biceps !== "-" ? biceps + " cm" : "-";

    weightInput.value = weight !== "-" ? weight : "";
    chestInput.value = chest !== "-" ? chest : "";
    waistInput.value = waist !== "-" ? waist : "";
    bicepsInput.value = biceps !== "-" ? biceps : "";
}

function saveMeasurements()
{
    let weight = weightInput.value;
    let chest = chestInput.value;
    let waist = waistInput.value;
    let biceps = bicepsInput.value;

    if (!weight || !chest || !waist || !biceps)
        return;

    localStorage.setItem("weight", weight);
    localStorage.setItem("chest", chest);
    localStorage.setItem("waist", waist);
    localStorage.setItem("biceps", biceps);

    let history =
        JSON.parse(localStorage.getItem("history") || "[]");

    history.push({
        date: new Date().toLocaleDateString("da-DK"),
        weight: Number(weight),
        chest: Number(chest),
        waist: Number(waist),
        biceps: Number(biceps)
    });

    localStorage.setItem(
        "history",
        JSON.stringify(history)
    );

    loadMeasurements();
    showHistory();
    loadChart();
}

function showHistory()
{
    let history =
        JSON.parse(localStorage.getItem("history") || "[]");

    if (history.length === 0)
    {
        history.innerHTML = "Ingen historik";
        return;
    }

    let html =
        "<table class='history-table'>" +
        "<tr><th>Dato</th><th>Vægt</th><th>Bryst</th><th>Mave</th><th>Biceps</th></tr>";

    history.slice().reverse().forEach(h =>
    {
        html +=
        "<tr>" +
        "<td>"+h.date+"</td>" +
        "<td>"+h.weight+"</td>" +
        "<td>"+h.chest+"</td>" +
        "<td>"+h.waist+"</td>" +
        "<td>"+h.biceps+"</td>" +
        "</tr>";
    });

    html += "</table>";

    document.getElementById("history").innerHTML = html;
}

function loadChart()
{
    let history =
        JSON.parse(localStorage.getItem("history") || "[]");

    let labels = history.map(h => h.date);

    if (chart)
        chart.destroy();

    chart =
        new Chart(document.getElementById("chart"),
        {
            type: "line",

            data:
            {
                labels: labels,

                datasets:
                [
                    { label: "Vægt", data: history.map(h=>h.weight) },
                    { label: "Bryst", data: history.map(h=>h.chest) },
                    { label: "Mave", data: history.map(h=>h.waist) },
                    { label: "Biceps", data: history.map(h=>h.biceps) }
                ]
            },

            options:
            {
                responsive: true,
                maintainAspectRatio: false,

                plugins:
                {
                    legend:
                    {
                        labels:
                        {
                            color: "white"
                        }
                    }
                },

                scales:
                {
                    x:
                    {
                        ticks: { color: "white" }
                    },
                    y:
                    {
                        ticks: { color: "white" }
                    }
                }
            }

        });
}

function clearHistory()
{
    localStorage.removeItem("history");

    showHistory();
    loadChart();
}

loadMeasurements();
showHistory();
loadChart();

</script>

</body>
</html>
