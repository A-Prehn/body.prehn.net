<!DOCTYPE html>
<html lang="da">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Træning Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
margin-bottom:20px;
border-radius:8px;
}

input{
width:100%;
padding:10px;
margin-top:5px;
background:#020617;
border:1px solid #334155;
color:white;
}

button{
margin-top:10px;
padding:10px 20px;
background:#1f7a6b;
border:none;
color:white;
cursor:pointer;
}

.chart-container{
height:300px;
}

.big{
font-size:26px;
}

</style>

</head>
<body>

<h2>Træning Dashboard</h2>

<div class="card">

<h3>Overview</h3>

<div class="big" id="overview">-</div>

</div>

<div class="card">

<h3>Ny måling</h3>

<input id="weight" placeholder="Vægt">
<input id="chest" placeholder="Bryst">
<input id="waist" placeholder="Mave">
<input id="biceps" placeholder="Biceps">

<button onclick="save()">Gem</button>

<div id="status"></div>

</div>

<div class="card">

<h3>Historik</h3>

<div id="history"></div>

</div>

<div class="card">

<h3>Graf</h3>

<div class="chart-container">
<canvas id="chart"></canvas>
</div>

</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbw-tJfqu9tdmpTroa_lFtNSfW8b37fnzwimU60bff2ldzZYjSm5SoXaMsukIeUx-YMW/exec";

let chart;

/* SAVE */

async function save()
{
const url =
API +
"?weight="+weight.value+
"&chest="+chest.value+
"&waist="+waist.value+
"&biceps="+biceps.value+
"&t="+Date.now();

status.innerHTML="Gemmer...";

await fetch(url);

status.innerHTML="Gemt";

load();
}

/* LOAD */

async function load()
{
const res = await fetch(API+"?t="+Date.now());

const data = await res.json();

console.log(data);

showOverview(data);
showHistory(data);
showChart(data);
}

/* OVERVIEW */

function showOverview(data)
{
if(data.length<2)return;

const last=data[data.length-1];

overview.innerHTML =
"Vægt: "+last[1]+
" | Bryst: "+last[2]+
" | Mave: "+last[3]+
" | Biceps: "+last[4];
}

/* HISTORY */

function showHistory(data)
{
let html="";

for(let i=data.length-1;i>=1;i--)
{
html +=
new Date(data[i][0]).toLocaleDateString()+
" | "+data[i][1]+"<br>";
}

history.innerHTML=html;
}

/* CHART */

function showChart(data)
{
const labels=[];
const values=[];

for(let i=1;i<data.length;i++)
{
labels.push(
new Date(data[i][0]).toLocaleDateString()
);

values.push(data[i][1]);
}

if(chart)chart.destroy();

chart=new Chart(
document.getElementById("chart"),
{
type:"line",

data:{
labels:labels,

datasets:[{
label:"Vægt",
data:values
}]
},

options:{
maintainAspectRatio:false
}
});
}

/* INIT */

load();

</script>

</body>
</html>
