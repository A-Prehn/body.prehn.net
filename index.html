<!DOCTYPE html>
<html lang="da">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Træning Dashboard</title>

<link rel="icon" href="data:,">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
    font-family: Segoe UI;
    background: #0f172a;
    color: white;
    margin: 0;
}

.header {
    background: #020617;
    padding: 20px;
    font-size: 22px;
}

.container {
    padding: 30px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 8px;
}

.big {
    font-size: 28px;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    background: #020617;
    border: 1px solid #334155;
    color: white;
}

button {
    margin-top: 10px;
    padding: 10px 20px;
    background: #1f7a6b;
    border: none;
    color: white;
    cursor: pointer;
}

.chart-container {
    height: 300px;
}

</style>

</head>
<body>

<div class="header">
Træning Dashboard
</div>

<div class="container">

<div class="grid">

<div class="card">
Vægt
<div class="big" id="weightOverview">-</div>
</div>

<div class="card">
Bryst
<div class="big" id="chestOverview">-</div>
</div>

<div class="card">
Mave
<div class="big" id="waistOverview">-</div>
</div>

<div class="card">
Biceps
<div class="big" id="bicepsOverview">-</div>
</div>

</div>

<br>

<div class="card">

<h3>Ny måling</h3>

<input id="weightInput" placeholder="Vægt">
<input id="chestInput" placeholder="Bryst">
<input id="waistInput" placeholder="Mave">
<input id="bicepsInput" placeholder="Biceps">

<button onclick="saveMeasurements()">
Gem
</button>

<div id="status"></div>

</div>

<br>

<div class="card">

<h3>Udvikling</h3>

<div class="chart-container">
<canvas id="chart"></canvas>
</div>

</div>

<br>

<div class="card">

<h3>Historik</h3>

<div id="history">
Loader...
</div>

</div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbw-tJfqu9tdmpTroa_lFtNSfW8b37fnzwimU60bff2ldzZYjSm5SoXaMsukIeUx-YMW/exec";

let chartInstance;

/* SAVE */

async function saveMeasurements()
{
    status.innerHTML="Gemmer...";

    const formData=new FormData();

    formData.append("weight",weightInput.value);
    formData.append("chest",chestInput.value);
    formData.append("waist",waistInput.value);
    formData.append("biceps",bicepsInput.value);

    try
    {
        await fetch(API_URL,
        {
            method:"POST",
            mode:"no-cors",
            body:formData
        });

        status.innerHTML="Gemt";

        setTimeout(loadData,1000);
    }
    catch(e)
    {
        status.innerHTML="Fejl ved gem";
        console.error(e);
    }
}

/* LOAD */

async function loadData()
{
    try
    {
        const response=
            await fetch(API_URL+"?t="+Date.now());

        const data=
            await response.json();

        console.log("Data loaded:",data);

        updateOverview(data);
        updateHistory(data);
        updateChart(data);

    }
    catch(e)
    {
        console.error("Load error:",e);
        history.innerHTML="Kunne ikke hente data";
    }
}

/* OVERVIEW */

function updateOverview(data)
{
    if(data.length<=1) return;

    const last=data[data.length-1];

    weightOverview.innerHTML=last[1]+" kg";
    chestOverview.innerHTML=last[2]+" cm";
    waistOverview.innerHTML=last[3]+" cm";
    bicepsOverview.innerHTML=last[4]+" cm";
}

/* HISTORY */

function updateHistory(data)
{
    let html="";

    for(let i=data.length-1;i>=1;i--)
    {
        const date=
        new Date(data[i][0])
        .toLocaleDateString("da-DK");

        html+=date+" | "+
        data[i][1]+" kg | "+
        data[i][2]+" cm | "+
        data[i][3]+" cm | "+
        data[i][4]+" cm<br>";
    }

    history.innerHTML=html;
}

/* CHART */

function updateChart(data)
{
    const ctx=
    document.getElementById("chart").getContext("2d");

    const labels=[];
    const weight=[];
    const chest=[];
    const waist=[];
    const biceps=[];

    for(let i=1;i<data.length;i++)
    {
        labels.push(
            new Date(data[i][0])
            .toLocaleDateString("da-DK")
        );

        weight.push(data[i][1]);
        chest.push(data[i][2]);
        waist.push(data[i][3]);
        biceps.push(data[i][4]);
    }

    if(chartInstance)
        chartInstance.destroy();

    chartInstance=
    new Chart(ctx,
    {
        type:"line",

        data:
        {
            labels,

            datasets:
            [
                {label:"Vægt",data:weight},
                {label:"Bryst",data:chest},
                {label:"Mave",data:waist},
                {label:"Biceps",data:biceps}
            ]
        },

        options:
        {
            maintainAspectRatio:false
        }
    });
}

/* INIT */

loadData();

</script>

</body>
</html>
