<!DOCTYPE html>
<html lang="da">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Træning Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Segoe UI;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

.title{
font-size:28px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
}

.card-title{
color:#94a3b8;
font-size:14px;
}

.card-value{
font-size:28px;
margin-top:5px;
}

.card-change{
font-size:14px;
margin-top:5px;
color:#22c55e;
}

input{
width:100%;
padding:10px;
margin-top:5px;
background:#020617;
border:1px solid #334155;
color:white;
}

button{
margin-top:10px;
padding:10px 20px;
background:#1f7a6b;
border:none;
color:white;
cursor:pointer;
}

.chart-container{
height:300px;
}

</style>

</head>
<body>

<div class="title">
Træning Dashboard
</div>

<!-- OVERVIEW -->

<div class="grid">

<div class="card">
<div class="card-title">Vægt</div>
<div class="card-value" id="weightValue">-</div>
<div class="card-change" id="weightChange"></div>
</div>

<div class="card">
<div class="card-title">Bryst</div>
<div class="card-value" id="chestValue">-</div>
<div class="card-change" id="chestChange"></div>
</div>

<div class="card">
<div class="card-title">Mave</div>
<div class="card-value" id="waistValue">-</div>
<div class="card-change" id="waistChange"></div>
</div>

<div class="card">
<div class="card-title">Biceps</div>
<div class="card-value" id="bicepsValue">-</div>
<div class="card-change" id="bicepsChange"></div>
</div>

</div>

<!-- INPUT -->

<div class="card">

<h3>Ny måling</h3>

<input id="weight" placeholder="Vægt">
<input id="chest" placeholder="Bryst">
<input id="waist" placeholder="Mave">
<input id="biceps" placeholder="Biceps">

<button onclick="save()">Gem</button>

<div id="status"></div>

</div>

<br>

<!-- GRAPH -->

<div class="card">

<h3>Udvikling</h3>

<div class="chart-container">
<canvas id="chart"></canvas>
</div>

</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbw-tJfqu9tdmpTroa_lFtNSfW8b37fnzwimU60bff2ldzZYjSm5SoXaMsukIeUx-YMW/exec";

let chart;

/* SAVE */

async function save()
{
const url=
API+
"?weight="+weight.value+
"&chest="+chest.value+
"&waist="+waist.value+
"&biceps="+biceps.value+
"&t="+Date.now();

status.innerHTML="Gemmer...";

await fetch(url);

status.innerHTML="Gemt";

load();
}

/* LOAD */

async function load()
{
const res=await fetch(API+"?t="+Date.now());

const data=await res.json();

updateOverview(data);
updateChart(data);
}

/* OVERVIEW */

function updateOverview(data)
{
if(data.length<2)return;

const last=data[data.length-1];
const prev=data.length>2?data[data.length-2]:last;

setCard("weight",last[1],prev[1]);
setCard("chest",last[2],prev[2]);
setCard("waist",last[3],prev[3]);
setCard("biceps",last[4],prev[4]);
}

function setCard(type,current,previous)
{
    const valueEl =
        document.getElementById(type+"Value");

    const changeEl =
        document.getElementById(type+"Change");

    const unit =
        type==="weight" ? "kg" : "cm";

    valueEl.innerHTML =
        current + " " + unit;

    const diff =
        Number(current) - Number(previous);

    if(diff===0)
    {
        changeEl.innerHTML="Ingen ændring";
        changeEl.style.color="#94a3b8";
        return;
    }

    const arrow =
        diff>0 ? "▲ " : "▼ ";

    changeEl.innerHTML =
        arrow + Math.abs(diff);

    /* DEFINER HVAD ER GODT */

    const goodDirection =
    {
        weight: "down",
        chest: "up",
        waist: "up",
        biceps: "up"
    };

    let isGood;

    if(goodDirection[type]==="down")
        isGood = diff<0;
    else
        isGood = diff>0;

    changeEl.style.color =
        isGood ? "#22c55e" : "#ef4444";
}

/* CHART */

function updateChart(data)
{
const labels=[];
const weightData=[];
const chestData=[];
const waistData=[];
const bicepsData=[];

for(let i=1;i<data.length;i++)
{
labels.push(
new Date(data[i][0]).toLocaleDateString()
);

weightData.push(data[i][1]);
chestData.push(data[i][2]);
waistData.push(data[i][3]);
bicepsData.push(data[i][4]);
}

if(chart)chart.destroy();

chart=new Chart(
document.getElementById("chart"),
{
type:"line",

data:
{
labels,

datasets:
[
{
label:"Vægt",
data:weightData,
borderColor:"#38bdf8"
},

{
label:"Bryst",
data:chestData,
borderColor:"#f472b6"
},

{
label:"Mave",
data:waistData,
borderColor:"#fb923c"
},

{
label:"Biceps",
data:bicepsData,
borderColor:"#facc15"
}
]
},

options:
{
maintainAspectRatio:false
}
});
}

/* INIT */

load();

</script>

</body>
</html>
