<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Træning Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
    font-family: Segoe UI, Arial;
    margin: 0;
    background: #0f172a;
    color: white;
}

.header {
    background: #020617;
    padding: 20px;
    font-size: 22px;
}

.container {
    padding: 30px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 8px;
}

.big {
    font-size: 28px;
}

input {
    width: 100%;
    padding: 6px;
    background: #020617;
    border: 1px solid #334155;
    color: white;
}

button {
    background: #1f7a6b;
    border: none;
    padding: 10px 20px;
    color: white;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 10px;
    margin-right: 10px;
}

button:hover {
    background: #145a4f;
}

.chart-container {
    height: 300px;
}

.history-table {
    width: 100%;
    border-collapse: collapse;
}

.history-table th,
.history-table td {
    padding: 10px;
    border-bottom: 1px solid #334155;
}

</style>

</head>
<body>

<div class="header">
Træning Dashboard (Google Sheets)
</div>

<div class="container">

<div class="grid">

<div class="card">
<h3>Vægt</h3>
<div class="big" id="weightDisplay">-</div>
</div>

<div class="card">
<h3>Bryst</h3>
<div class="big" id="chestDisplay">-</div>
</div>

<div class="card">
<h3>Mave</h3>
<div class="big" id="waistDisplay">-</div>
</div>

<div class="card">
<h3>Biceps</h3>
<div class="big" id="bicepsDisplay">-</div>
</div>

</div>

<br>

<div class="card">

<h3>Opdater kropsmål</h3>

<table>

<tr>
<td>Vægt</td>
<td><input id="weightInput" type="number"></td>
</tr>

<tr>
<td>Bryst</td>
<td><input id="chestInput" type="number"></td>
</tr>

<tr>
<td>Mave</td>
<td><input id="waistInput" type="number"></td>
</tr>

<tr>
<td>Biceps</td>
<td><input id="bicepsInput" type="number"></td>
</tr>

</table>

<button onclick="saveMeasurements()">Gem i Google Sheets</button>

</div>

<br>

<div class="card">

<h3>Udvikling</h3>

<div class="chart-container">
<canvas id="chart"></canvas>
</div>

</div>

<br>

<div class="card">

<h3>Historik</h3>

<div id="history">Loader...</div>

</div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbw-tJfqu9tdmpTroa_lFtNSfW8b37fnzwimU60bff2ldzZYjSm5SoXaMsukIeUx-YMW/exec";

let chart;

/* GEM */

function saveMeasurements()
{
    let weight = weightInput.value;
    let chest = chestInput.value;
    let waist = waistInput.value;
    let biceps = bicepsInput.value;

    fetch(API_URL,
    {
        method: "POST",

        headers:
        {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            weight,
            chest,
            waist,
            biceps
        })

    })
    .then(r => r.text())
    .then(() =>
    {
        loadData();
    });
}

/* HENT DATA */

function loadData()
{
    fetch(API_URL)
    .then(r => r.json())
    .then(data =>
    {
        processData(data);
    });
}

/* PROCESS DATA */

function processData(data)
{
    if (data.length <= 1)
        return;

    let labels = [];
    let weight = [];
    let chest = [];
    let waist = [];
    let biceps = [];

    let html =
    "<table class='history-table'>" +
    "<tr>" +
    "<th>Dato</th>" +
    "<th>Vægt</th>" +
    "<th>Bryst</th>" +
    "<th>Mave</th>" +
    "<th>Biceps</th>" +
    "</tr>";

    for (let i = 1; i < data.length; i++)
    {
        let row = data[i];

        let date =
        new Date(row[0]).toLocaleDateString("da-DK");

        labels.push(date);

        weight.push(row[1]);
        chest.push(row[2]);
        waist.push(row[3]);
        biceps.push(row[4]);

        html +=
        "<tr>" +
        "<td>"+date+"</td>" +
        "<td>"+row[1]+"</td>" +
        "<td>"+row[2]+"</td>" +
        "<td>"+row[3]+"</td>" +
        "<td>"+row[4]+"</td>" +
        "</tr>";
    }

    html += "</table>";

    history.innerHTML = html;

    weightDisplay.innerHTML =
    weight.at(-1) + " kg";

    chestDisplay.innerHTML =
    chest.at(-1) + " cm";

    waistDisplay.innerHTML =
    waist.at(-1) + " cm";

    bicepsDisplay.innerHTML =
    biceps.at(-1) + " cm";

    drawChart(labels, weight, chest, waist, biceps);
}

/* TEGN GRAF */

function drawChart(labels, weight, chest, waist, biceps)
{
    if (chart)
        chart.destroy();

    chart =
    new Chart(chart,
    {
        type: "line",

        data:
        {
            labels,

            datasets:
            [
                { label: "Vægt", data: weight },
                { label: "Bryst", data: chest },
                { label: "Mave", data: waist },
                { label: "Biceps", data: biceps }
            ]
        },

        options:
        {
            maintainAspectRatio: false,

            plugins:
            {
                legend:
                {
                    labels:
                    {
                        color: "white"
                    }
                }
            },

            scales:
            {
                x:
                {
                    ticks:
                    {
                        color: "white"
                    }
                },

                y:
                {
                    ticks:
                    {
                        color: "white"
                    }
                }
            }
        }

    });
}

/* LOAD VED START */

loadData();

</script>

</body>
</html>
